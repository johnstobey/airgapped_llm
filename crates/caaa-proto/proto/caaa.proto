syntax = "proto3";
package caaa;

// CAAA Core gRPC Service Definition
// Implements mTLS-secured communication between applet and daemon

service CaaaCore {
  // Initialize a new chat session with constitutional constraints
  rpc InitSession(SessionRequest) returns (SessionResponse);
  
  // Send a user message and receive streaming response
  rpc SendMessage(stream UserMessage) returns (stream AgentResponse);
  
  // Request vault operations (read/write with audit trail)
  rpc VaultOperation(VaultRequest) returns (VaultResponse);
  
  // Health check and status reporting
  rpc GetStatus(StatusRequest) returns (StatusResponse);
  
  // Emergency shutdown (authenticated only)
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

// Session Management
message SessionRequest {
  string user_id = 1;
  repeated string active_constraints = 2; // Constitutional rule IDs
  optional string vault_path = 3;
}

message SessionResponse {
  string session_id = 1;
  bool success = 2;
  optional string error_message = 3;
  repeated string loaded_rules = 4;
}

// Message Streaming
message UserMessage {
  string session_id = 1;
  string content = 2;
  MessageType type = 3;
  optional int64 timestamp = 4;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_COMMAND = 2;
  MESSAGE_TYPE_VAULT_QUERY = 3;
}

message AgentResponse {
  string session_id = 1;
  oneof response_type {
    TextResponse text = 2;
    CommandResponse command = 3;
    ConstitutionalViolation violation = 4;
    StatusUpdate status = 5;
    ErrorInfo error = 6;
  }
}

message TextResponse {
  string content = 1;
  bool is_complete = 2;
  optional float confidence = 3;
}

message CommandResponse {
  string command_id = 1;
  string action = 2;
  map<string, string> parameters = 3;
  bool requires_confirmation = 4;
}

// Constitutional Layer
message ConstitutionalViolation {
  string rule_id = 1;
  string rule_description = 2;
  string original_output = 3;
  string sanitized_output = 4;
  ViolationAction action_taken = 5;
  repeated string triggered_patterns = 6;
}

enum ViolationAction {
  VIOLATION_ACTION_UNSPECIFIED = 0;
  VIOLATION_ACTION_REDACT = 1;
  VIOLATION_ACTION_REWRITE = 2;
  VIOLATION_ACTION_BLOCK = 3;
  VIOLATION_ACTION_WARN = 4;
}

// STATUS_BLOCK - Computed from ground-truth state (NOT LLM)
message StatusUpdate {
  SystemState system = 1;
  VaultState vault = 2;
  AuditState audit = 3;
  ReasoningState reasoning = 4;
}

message SystemState {
  bool network_isolated = 1;
  double cpu_usage = 2;
  double memory_usage = 3;
  int64 uptime_seconds = 4;
  string version = 5;
}

message VaultState {
  bool is_locked = 1;
  int64 total_notes = 2;
  int64 recent_modifications = 3;
  optional string last_backup = 4;
}

message AuditState {
  bool is_writing = 1;
  int64 entries_today = 2;
  optional string last_entry_time = 3;
  bool integrity_verified = 4;
}

message ReasoningState {
  string active_model = 1;
  bool engine_healthy = 2;
  double avg_latency_ms = 3;
  int64 requests_processed = 4;
}

// Vault Operations
message VaultRequest {
  string session_id = 1;
  VaultOperationType operation = 2;
  optional string note_path = 3;
  optional string content = 4;
  optional string search_query = 5;
}

enum VaultOperationType {
  VAULT_OPERATION_UNSPECIFIED = 0;
  VAULT_OPERATION_READ = 1;
  VAULT_OPERATION_WRITE = 2;
  VAULT_OPERATION_DELETE = 3;
  VAULT_OPERATION_SEARCH = 4;
  VAULT_OPERATION_LIST = 5;
}

message VaultResponse {
  bool success = 1;
  optional string content = 2;
  repeated string note_paths = 3;
  optional string error_message = 4;
  optional string audit_entry_id = 5;
}

// Health & Control
message StatusRequest {
  optional bool include_detailed_metrics = 1;
}

message ShutdownRequest {
  string admin_token = 1;
  bool force = 2;
}

message ShutdownResponse {
  bool success = 1;
  string message = 2;
}

// Error Handling
message ErrorInfo {
  ErrorCode code = 1;
  string message = 2;
  optional string details = 3;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_OK = 1;
  ERROR_CODE_CONSTITUTIONAL_VIOLATION = 2;
  ERROR_CODE_SESSION_TIMEOUT = 3;
  ERROR_CODE_VAULT_LOCKED = 4;
  ERROR_CODE_MODEL_UNAVAILABLE = 5;
  ERROR_CODE_NETWORK_DETECTED = 6;
  ERROR_CODE_AUDIT_FAILURE = 7;
  ERROR_CODE_INVALID_REQUEST = 8;
  ERROR_CODE_INTERNAL_ERROR = 9;
}
